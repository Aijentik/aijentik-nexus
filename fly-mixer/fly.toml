# Fill APP_NAME with whatever `fly launch` picks (or set it explicitly).
app = "venue-mixer"
primary_region = "lhr"   # London — change to your nearest region

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"   # keep alive for incoming Twilio calls
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
